<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Berry's — Dashboard Meta Ads</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --berry:    #45B9E6;
  --berry2:   #83D4F1;
  --berry3:   #A3DDF0;
  --berry4:   #A7DDE9;
  --ice:      #CEEBF1;
  --ice2:     #E4F5FA;
  --ice3:     #F2FAFE;
  --white:    #FFFFFF;
  --ink:      #0E1A2B;
  --ink2:     #3A5169;
  --ink3:     #6A8CA3;
  --navy:     #0B2540;
  --green:    #22C55E;
  --green-bg: rgba(34,197,94,.12);
  --shadow:   0 4px 24px rgba(69,185,230,.13);
  --shadow-sm:0 2px 12px rgba(69,185,230,.10);
  --r-card:   22px;
  --r-pill:   100px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nunito', 'Segoe UI', sans-serif;
  background: #D4EEF8;
  min-height: 100vh;
}

/* ── SETUP BAR ── */
.setup-bar {
  background: var(--navy);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  border-bottom: 2px solid rgba(69,185,230,.3);
}
.setup-bar label { color: var(--berry2); font-size: 11px; font-weight: 800; white-space: nowrap; letter-spacing: .5px; text-transform: uppercase; }
.setup-bar input {
  flex: 1; min-width: 180px; padding: 7px 14px; border-radius: 10px;
  border: 1.5px solid rgba(69,185,230,.25); font-size: 13px;
  background: rgba(255,255,255,.07); color: white; font-family: inherit;
  transition: border-color .2s;
}
.setup-bar input:focus { outline: none; border-color: var(--berry); }
.setup-bar input::placeholder { color: rgba(255,255,255,.3); }
.setup-bar select {
  padding: 7px 12px; border-radius: 10px; border: 1.5px solid rgba(69,185,230,.25);
  font-size: 12px; background: rgba(255,255,255,.07); color: white; cursor: pointer;
  font-family: inherit; font-weight: 700;
}
.btn-connect {
  background: linear-gradient(135deg, var(--berry), #2AA6D8);
  color: white; border: none; padding: 8px 20px; border-radius: 10px;
  font-size: 12px; font-weight: 800; cursor: pointer; letter-spacing: .3px;
  font-family: inherit; box-shadow: 0 4px 14px rgba(69,185,230,.35);
  transition: transform .15s, box-shadow .15s;
}
.btn-connect:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(69,185,230,.45); }

/* ── TABS ── */
.tabs-wrap {
  background: var(--white);
  border-bottom: 2px solid var(--ice);
  overflow-x: auto; white-space: nowrap; padding: 0 16px;
  position: sticky; top: 0; z-index: 10;
  box-shadow: 0 2px 16px rgba(69,185,230,.12);
  scrollbar-width: none;
}
.tabs-wrap::-webkit-scrollbar { display: none; }
.tab {
  display: inline-block; padding: 12px 16px; cursor: pointer;
  font-size: 12px; font-weight: 700; color: var(--ink3);
  border-bottom: 3px solid transparent; transition: all .15s;
  user-select: none; letter-spacing: .2px;
}
.tab:hover { color: var(--berry); }
.tab.active { color: var(--berry); border-bottom-color: var(--berry); }

/* ── PAGE WRAPPER ── */
.page { max-width: 440px; margin: 0 auto; padding: 18px 14px 40px; }

/* ── HEADER ── */
.dash-header {
  background: linear-gradient(165deg, #45B9E6 0%, #2A9FCC 40%, #1A7FAA 100%);
  border-radius: 28px; padding: 26px 24px 22px; margin-bottom: 16px;
  position: relative; overflow: hidden; min-height: 210px;
}
.dash-header::before {
  content: '';
  position: absolute; inset: 0; border-radius: 28px;
  background-image:
    radial-gradient(ellipse 18px 22px at 28px 30px, rgba(255,255,255,.10) 100%, transparent 100%),
    radial-gradient(ellipse 12px 15px at 80px 55px, rgba(255,255,255,.07) 100%, transparent 100%),
    radial-gradient(ellipse 20px 14px at 150px 25px, rgba(255,255,255,.08) 100%, transparent 100%),
    radial-gradient(ellipse 10px 18px at 200px 60px, rgba(255,255,255,.06) 100%, transparent 100%),
    radial-gradient(ellipse 16px 11px at 60px 90px, rgba(255,255,255,.07) 100%, transparent 100%),
    radial-gradient(ellipse 22px 16px at 130px 80px, rgba(255,255,255,.05) 100%, transparent 100%);
  pointer-events: none;
}
.dash-header::after {
  content: '✦  ✦  ✦';
  position: absolute; top: 16px; right: 130px;
  color: rgba(255,255,255,.25); font-size: 11px; letter-spacing: 10px;
  pointer-events: none; white-space: nowrap;
}
.hdr-deco-ring {
  position: absolute; right: -30px; bottom: -40px;
  width: 220px; height: 220px; border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,255,.15) 0%, transparent 70%);
  pointer-events: none;
}
.hdr-deco-ring2 {
  position: absolute; right: 50px; bottom: -80px;
  width: 130px; height: 130px; border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,255,.08) 0%, transparent 70%);
  pointer-events: none;
}
.h-brand { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.h-brand-box {
  background: white; border-radius: 14px; padding: 7px 13px;
  display: flex; align-items: center; gap: 7px;
  box-shadow: 0 2px 12px rgba(0,0,0,.12);
}
.h-brand-ico { font-size: 18px; line-height: 1; }
.h-brand-name { font-size: 15px; font-weight: 900; color: var(--berry); letter-spacing: .5px; line-height: 1; }
.h-brand-sub { font-size: 8px; color: var(--ink3); font-weight: 700; letter-spacing: 2px; text-transform: uppercase; line-height: 1; margin-top: 2px; }
.h-title { color: white; font-size: 36px; font-weight: 900; line-height: 1; margin-bottom: 2px; letter-spacing: -.5px; text-shadow: 0 2px 8px rgba(0,0,0,.15); }
.h-sub { color: rgba(255,255,255,.75); font-size: 13px; font-weight: 600; }
.h-unit { color: white; font-weight: 900; font-size: 15px; margin-top: 1px; letter-spacing: .3px; }
.h-pills { margin-top: 14px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.date-pill {
  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(255,255,255,.22); backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,.3); border-radius: var(--r-pill);
  padding: 5px 14px; color: white; font-size: 11px; font-weight: 700;
}
.live-pill {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--green-bg); border: 1.5px solid rgba(34,197,94,.4);
  color: #4ADE80; border-radius: var(--r-pill); padding: 5px 13px;
  font-size: 11px; font-weight: 800; backdrop-filter: blur(8px);
}
.live-pill .dot { width: 7px; height: 7px; border-radius: 50%; background: #4ADE80; animation: pulse 1.5s ease-in-out infinite; flex-shrink: 0; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(.8)} }
.mascot {
  position: absolute; right: -6px; bottom: 0; height: 190px;
  filter: drop-shadow(-4px 4px 20px rgba(0,0,0,.25));
  object-fit: contain;
}

/* ── KPI CARDS ── */
.kpi-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 14px; }
.kpi-card {
  background: var(--white); border-radius: var(--r-card); padding: 16px 10px 14px;
  text-align: center; box-shadow: var(--shadow-sm);
  border: 1.5px solid rgba(69,185,230,.13);
  position: relative; overflow: hidden;
}
.kpi-card::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
  border-radius: 0 0 var(--r-card) var(--r-card);
}
.kpi-card.kc-money::after { background: linear-gradient(90deg, #45B9E6, #83D4F1); }
.kpi-card.kc-reach::after { background: linear-gradient(90deg, #22C55E, #4ADE80); }
.kpi-card.kc-eye::after   { background: linear-gradient(90deg, #A78BFA, #C4B5FD); }
.kpi-icon-wrap {
  width: 42px; height: 42px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center; margin: 0 auto 9px; font-size: 20px;
}
.ki-money { background: linear-gradient(135deg, #DDEEFA, #C4E6F8); }
.ki-reach { background: linear-gradient(135deg, #DCFCE7, #BBF7D0); }
.ki-eye   { background: linear-gradient(135deg, #EDE9FE, #DDD6FE); }
.kpi-label { font-size: 9px; color: var(--ink3); font-weight: 700; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 4px; }
.kpi-value { font-size: 14px; font-weight: 900; color: var(--ink); line-height: 1.1; }

/* ── SECTION CARD ── */
.section {
  background: var(--white); border-radius: var(--r-card); padding: 20px 18px;
  margin-bottom: 14px; box-shadow: var(--shadow-sm);
  border: 1.5px solid rgba(69,185,230,.10);
}
.sec-title {
  font-size: 15px; font-weight: 900; color: var(--ink); margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}
.sec-title-ico {
  width: 32px; height: 32px; border-radius: 10px; display: flex;
  align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0;
}
.ico-bg-blue  { background: linear-gradient(135deg, #DDEEFA, #C4E6F8); }
.ico-bg-green { background: linear-gradient(135deg, #DCFCE7, #BBF7D0); }
.ico-bg-gold  { background: linear-gradient(135deg, #FEF9C3, #FDE68A); }
.ico-bg-purple{ background: linear-gradient(135deg, #EDE9FE, #DDD6FE); }
.ico-bg-pink  { background: linear-gradient(135deg, #FCE7F3, #FBCFE8); }

/* ── CAMPAIGNS ── */
.camp-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--ice); }
.camp-item:last-child { border-bottom: none; padding-bottom: 0; }
.camp-ico-wrap {
  width: 42px; height: 42px; min-width: 42px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; font-size: 18px;
}
.ci-video  { background: linear-gradient(135deg, #45B9E6, #2AA6D8); }
.ci-follow { background: linear-gradient(135deg, #83D4F1, #45B9E6); }
.ci-conv   { background: linear-gradient(135deg, #22C55E, #16A34A); }
.ci-reach  { background: linear-gradient(135deg, #A78BFA, #7C3AED); }
.ci-other  { background: linear-gradient(135deg, #A3DDF0, #45B9E6); }
.camp-name { font-size: 12px; font-weight: 800; color: var(--ink); margin-bottom: 6px; line-height: 1.35; }
.camp-chips { display: flex; gap: 5px; flex-wrap: wrap; }
.chip {
  display: inline-flex; align-items: center; gap: 3px;
  background: var(--ice2); border-radius: var(--r-pill);
  padding: 3px 9px; font-size: 10px; font-weight: 700; color: var(--ink2);
}
.chip span { color: var(--berry); font-weight: 900; }

/* ── META RESUMO ── */
.meta-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.meta-logo {
  width: 44px; height: 44px; border-radius: 13px; flex-shrink: 0;
  background: linear-gradient(135deg, #0668E1, #0090FF);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; color: white; font-weight: 900;
  box-shadow: 0 4px 14px rgba(6,104,225,.25);
}
.meta-info-label { font-size: 10px; color: var(--ink3); font-weight: 700; letter-spacing: .5px; text-transform: uppercase; }
.meta-info-name  { font-size: 13px; font-weight: 900; color: var(--ink); }
.resumo-grid {
  display: grid; grid-template-columns: repeat(4,1fr); gap: 8px;
  background: var(--ice2); border-radius: 16px; padding: 14px 12px;
  border: 1.5px solid rgba(69,185,230,.15);
}
.rg-label { font-size: 8px; color: var(--ink3); margin-bottom: 3px; text-transform: uppercase; letter-spacing: .6px; font-weight: 700; }
.rg-value { font-size: 11px; font-weight: 900; color: var(--ink); }

/* ── TOP ADS ── */
.ad-item { display: flex; align-items: center; gap: 10px; padding: 13px 0; border-bottom: 1px solid var(--ice); }
.ad-item:last-child { border-bottom: none; padding-bottom: 0; }
.ad-item.rank-1 { padding-top: 0; }
.rank-badge {
  width: 30px; height: 30px; min-width: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: 13px; flex-shrink: 0;
}
.rb-1 { background: linear-gradient(135deg, #FCD34D, #F59E0B); color: #7C3A00; box-shadow: 0 2px 10px rgba(245,158,11,.35); }
.rb-2 { background: linear-gradient(135deg, #D1D5DB, #9CA3AF); color: #1F2937; }
.rb-3 { background: linear-gradient(135deg, #D97706, #B45309); color: white; }
.ad-thumb { width: 58px; height: 58px; min-width: 58px; border-radius: 14px; object-fit: cover; background: var(--ice); }
.ad-thumb-ph { width: 58px; height: 58px; min-width: 58px; border-radius: 14px; background: var(--ice2); display: flex; align-items: center; justify-content: center; font-size: 26px; border: 1.5px solid var(--ice); }
.ad-info { flex: 1; min-width: 0; }
.ad-name { font-size: 11px; font-weight: 800; color: var(--ink); margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ad-metrics { display: grid; grid-template-columns: repeat(4,1fr); gap: 4px; }
.am-l { font-size: 8px; color: var(--ink3); font-weight: 700; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 1px; }
.am-v { font-size: 11px; font-weight: 900; color: var(--ink); }
.top1-wrap { position: relative; }
.top1-seal {
  position: absolute; top: -6px; right: -4px;
  background: linear-gradient(135deg, #FCD34D, #F59E0B);
  color: #7C3A00; font-size: 8px; font-weight: 900;
  padding: 3px 8px; border-radius: var(--r-pill);
  box-shadow: 0 2px 8px rgba(245,158,11,.35); white-space: nowrap; letter-spacing: .3px;
}
.top1-card {
  background: linear-gradient(135deg, #FFF9EB, #FFFBF3);
  border: 2px solid rgba(245,158,11,.2); border-radius: 16px;
  padding: 13px 12px; margin-bottom: 12px;
  box-shadow: 0 4px 18px rgba(245,158,11,.10);
}

/* ── INSIGHTS ── */
.ins-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; }
.ins-card {
  background: var(--ice2); border-radius: 16px; padding: 15px 13px;
  border: 1.5px solid rgba(69,185,230,.15);
  transition: transform .15s;
}
.ins-card:hover { transform: translateY(-2px); }
.ins-ico-wrap {
  width: 36px; height: 36px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; margin-bottom: 8px;
  background: white; box-shadow: 0 2px 8px rgba(69,185,230,.12);
}
.ins-label { font-size: 9px; color: var(--ink3); font-weight: 700; text-transform: uppercase; letter-spacing: .6px; margin-bottom: 3px; }
.ins-name { font-size: 10px; font-weight: 700; color: var(--ink2); margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ins-value { font-size: 15px; font-weight: 900; color: var(--berry); }

/* ── FOOTER ── */
.dash-footer {
  background: linear-gradient(135deg, var(--berry), #2AA6D8);
  border-radius: 20px; padding: 18px 20px; margin-top: 4px;
  text-align: center; position: relative; overflow: hidden;
}
.dash-footer::before {
  content: '✦  ✦  ✦  ✦  ✦';
  position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,.2); font-size: 9px; letter-spacing: 8px; white-space: nowrap;
}
.foot-brand { color: white; font-size: 14px; font-weight: 900; margin-bottom: 4px; letter-spacing: .3px; }
.foot-tagline { color: rgba(255,255,255,.8); font-size: 11px; font-weight: 600; font-style: italic; margin-bottom: 6px; }
.foot-meta { color: rgba(255,255,255,.55); font-size: 9px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase; }

/* ── EXPORT ── */
.export-wrap { max-width: 440px; margin: 0 auto; padding: 0 14px 50px; }
.btn-export {
  background: linear-gradient(135deg, var(--navy), #1A4070);
  color: white; border: none; padding: 16px; border-radius: 16px;
  font-size: 14px; font-weight: 800; cursor: pointer; width: 100%;
  box-shadow: 0 4px 18px rgba(11,37,64,.3); font-family: inherit; letter-spacing: .3px;
  transition: transform .15s, box-shadow .15s;
}
.btn-export:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(11,37,64,.4); }
.btn-export:disabled { opacity: .5; cursor: default; transform: none; }

/* ── STATES ── */
.state-box { text-align: center; padding: 64px 24px; color: var(--ink3); }
.state-ico { font-size: 52px; margin-bottom: 16px; }
.state-box p { font-size: 14px; line-height: 1.75; font-weight: 600; }
.state-box strong { color: var(--berry); }
.spinner {
  width: 38px; height: 38px; border: 3px solid var(--ice);
  border-top-color: var(--berry); border-radius: 50%;
  animation: spin .75s linear infinite; margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.err-box {
  background: #FFF0F0; border: 1.5px solid #FCA5A5;
  border-radius: 14px; padding: 14px; color: #DC2626;
  font-size: 13px; margin: 14px 0; font-weight: 700;
}
.no-data { color: var(--ink3); font-size: 13px; text-align: center; padding: 16px 0; font-weight: 600; }

/* ── DIVIDER ── */
.section-divider {
  display: flex; align-items: center; gap: 10px; margin: 4px 0 14px;
}
.section-divider::before, .section-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--ice);
}
.section-divider span { font-size: 16px; }
</style>
</head>
<body>

<div class="setup-bar">
  <label>🔑 Token:</label>
  <input type="password" id="tokenInput" placeholder="Cole o Access Token do Meta Ads…" />
  <select id="datePreset" onchange="reloadTab()">
    <option value="this_month">Mês atual</option>
    <option value="last_month">Mês anterior</option>
    <option value="last_7d">Últimos 7 dias</option>
    <option value="last_30d">Últimos 30 dias</option>
    <option value="this_year">Este ano</option>
  </select>
  <button class="btn-connect" onclick="connect()">Conectar</button>
</div>

<div class="tabs-wrap" id="tabsWrap"></div>

<div class="page" id="dashPage">
  <div class="state-box">
    <div class="state-ico">🍦</div>
    <p>Cole o <strong>Access Token</strong> da Meta acima<br>e clique em <strong>Conectar</strong> para carregar<br>os dados da unidade.</p>
  </div>
</div>

<div class="export-wrap" id="exportWrap" style="display:none">
  <button class="btn-export" id="btnExport" onclick="exportImage()">📸 Exportar como imagem</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
const ACCOUNTS = [

  { id: '1228370282243542',  name: 'Salvador Rua' },

  { id: '668267178630065',   name: 'Cuiabá' },
  { id: '3059066484235266',  name: 'Patos de Minas' },

  { id: '2350525475462622',  name: 'Foz do Iguaçu 02' },
];

const GRAPH = 'https://graph.facebook.com/v20.0';
let token = '', activeTab = 0;
const cache = {};

function buildTabs() {
  document.getElementById('tabsWrap').innerHTML =
    ACCOUNTS.map((a,i) =>
      `<div class="tab${i===0?' active':''}" id="tab${i}" onclick="switchTab(${i})">${a.name}</div>`
    ).join('');
}

function switchTab(i) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`tab${i}`).classList.add('active');
  activeTab = i;
  if (token) loadData(i);
}

function connect() {
  token = document.getElementById('tokenInput').value.trim();
  if (!token) { alert('Cole o Access Token antes de conectar.'); return; }
  Object.keys(cache).forEach(k => delete cache[k]);
  document.getElementById('exportWrap').style.display = 'block';
  loadData(activeTab);
}

function reloadTab() {
  Object.keys(cache).forEach(k => delete cache[k]);
  if (token) loadData(activeTab);
}

async function gql(path, params={}) {
  const url = new URL(`${GRAPH}/${path}`);
  url.searchParams.set('access_token', token);
  for (const [k,v] of Object.entries(params)) url.searchParams.set(k,v);
  const r = await fetch(url);
  const d = await r.json();
  if (d.error) throw new Error(d.error.message);
  return d;
}

async function loadData(idx) {
  const acc = ACCOUNTS[idx];
  const preset = document.getElementById('datePreset').value;
  const key = `${acc.id}_${preset}`;
  setLoading(acc.name);
  try {
    if (!cache[key]) cache[key] = await fetchAll(acc, preset);
    render(acc, cache[key]);
  } catch(e) { setError(e.message); }
}

async function fetchAll(acc, preset) {
  const act = `act_${acc.id}`;

  const totals = await gql(`${act}/insights`, { fields:'spend,reach,impressions', date_preset:preset })
    .catch(e => { throw new Error('[1/4 insights] ' + e.message); });

  const camps = await gql(`${act}/campaigns`, {
    fields: 'name,objective,effective_status',
    limit: 50
  }).catch(e => { throw new Error('[2/4 campaigns] ' + e.message); });

  const campIns = await gql(`${act}/insights`, {
    level: 'campaign', fields: 'campaign_id,campaign_name,spend,reach,impressions',
    date_preset: preset, limit: 30
  }).catch(e => { throw new Error('[3/4 campaign insights] ' + e.message); });

  const adsIns = await gql(`${act}/insights`, {
    level:'ad', fields:'ad_id,ad_name,spend,reach,impressions,clicks',
    date_preset:preset, limit:20
  }).catch(e => { throw new Error('[4/4 ad insights] ' + e.message); });

  const campInsMap = {};
  (campIns.data||[]).forEach(c => { campInsMap[c.campaign_id] = c; });

  const campaigns = (camps.data||[])
    .map(c => ({ ...c, _ins: campInsMap[c.id] || null }))
    .filter(c => Number(c._ins?.impressions||0) > 1);

  const rawAds = (adsIns.data||[])
    .filter(a => Number(a.impressions||0) > 1)
    .sort((a,b) => Number(b.reach||0) - Number(a.reach||0))
    .slice(0,3);

  const topAds = await Promise.all(rawAds.map(async ad => {
    try {
      const d = await gql(ad.ad_id, { fields:'creative{thumbnail_url,image_url}' });
      return { ...ad, thumb: d.creative?.thumbnail_url || d.creative?.image_url || null };
    } catch { return { ...ad, thumb:null }; }
  }));

  return { summary: totals.data?.[0]||{}, campaigns, topAds };
}

const N   = n => n ? Number(n).toLocaleString('pt-BR') : '0';
const BRL = n => n ? Number(n).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}) : 'R$ 0,00';

function dateLabel() {
  const p = document.getElementById('datePreset').value;
  const d = new Date(), day=d.getDate(), yr=d.getFullYear();
  const mo = d.toLocaleString('pt-BR',{month:'long'});
  return { this_month:`01 a ${day} de ${mo} de ${yr}`, last_month:'Mês anterior',
           last_7d:'Últimos 7 dias', last_30d:'Últimos 30 dias',
           this_year:`Janeiro a ${mo} de ${yr}` }[p]||p;
}

function periodShort() {
  const p = document.getElementById('datePreset').value;
  const d = new Date();
  return { this_month:`01–${d.getDate()}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`,
           last_month:'Mês anterior', last_7d:'Últ. 7 dias',
           last_30d:'Últ. 30 dias', this_year:String(d.getFullYear()) }[p]||p;
}

function campIcon(name='', obj='') {
  const t = (name+obj).toUpperCase();
  if (t.includes('VIDEO')||t.includes('VÍDEO')||t.includes('REEL')) return {cls:'ci-video', ico:'▶'};
  if (t.includes('SEGUIDOR')||t.includes('FOLLOW')||t.includes('PERFIL')) return {cls:'ci-follow', ico:'👤'};
  if (t.includes('IFOOD')||t.includes('DELIVERY')||t.includes('VENDA')||t.includes('CONVERSÃO')) return {cls:'ci-conv', ico:'🛒'};
  if (t.includes('ALCAN')||t.includes('REACH')||t.includes('TEMÁTIC')||t.includes('TEMATIC')) return {cls:'ci-reach', ico:'📡'};
  return {cls:'ci-other', ico:'📣'};
}

function setLoading(name) {
  document.getElementById('dashPage').innerHTML =
    `<div class="state-box"><div class="spinner"></div><p>Carregando dados de<br><strong>${name}</strong>…</p></div>`;
}
function setError(msg) {
  document.getElementById('dashPage').innerHTML =
    `<div class="state-box"><div class="state-ico">⚠️</div>
     <div class="err-box">${msg}</div>
     <p style="font-size:12px;font-weight:600">Verifique o token e a permissão <code>ads_read</code>.</p></div>`;
}

            <div><div class="am-l">Impressões</div><div class="am-v">${N(ad.impressions)}</div></div>
            <div><div class="am-l">Cliques</div><div class="am-v">${N(ad.clicks)}</div></div>
          </div>
        </div>

  const adsHtml = topAds.length === 0
    ? '<p class="no-data">Sem dados de anúncios no período.</p>'
    : top1Html + (otherAdsHtml ? `<div class="section-divider"><span>🍧</span></div>${otherAdsHtml}` : '');

    {ico:'👥', bg:'ico-bg-green',  label:'Maior alcance',          name:topRch?.ad_name||'—', value:`${N(topRch?.reach)} pessoas`},

  document.getElementById('dashPage').innerHTML = `

    <div class="kpi-grid">

      <div class="kpi-card kc-eye">

        <div class="kpi-label">Impressões</div>
        <div class="kpi-value">${N(summary.impressions)}</div>
      </div>
    </div>
    <div class="section">
      <div class="sec-title">
        <div class="sec-title-ico ico-bg-blue">📣</div>
        Campanhas veiculadas

    <div class="section">

    <div class="section">

      <div class="foot-meta">Relatório gerado com dados de Meta Ads · ${acc.name}</div>
    </div>
  </div>`;
}

async function exportImage() {
  const el = document.getElementById('exportTarget');
  if (!el) return;
  const btn = document.getElementById('btnExport');
  btn.disabled = true; btn.textContent = '⏳ Gerando imagem…';
  try {
    const canvas = await html2canvas(el, { scale:2.5, useCORS:true, backgroundColor:'#D4EEF8', logging:false });
    const link = document.createElement('a');
    link.download = `berrys_${ACCOUNTS[activeTab].name.replace(/\s+/g,'_')}_meta_ads.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch(e) { alert('Erro: '+e.message); }
  btn.disabled = false; btn.textContent = '📸 Exportar como imagem';
}
